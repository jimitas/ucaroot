<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uca_root 単語帳</title>
  <link rel="stylesheet" href="css/tango.css">

  <audio id="se_1" preload="auto">
    <source src="Sounds/set1.mp3" type="audio/mp3">
  </audio>
  <audio id="se_2" preload="auto">
    <source src="Sounds/pi.mp3" type="audio/mp3">
  </audio>
</head>

<body>
  <header>
    <h1>Uca_root 単語帳</h1>
    <div class="cat-row">
      <label><input type="checkbox" id="c_01">教育法規</label>
      <label><input type="checkbox" id="c_02">教育原理</label>
      <label><input type="checkbox" id="c_03">生徒指導</label>
      <label><input type="checkbox" id="c_04">人権教育</label>
    </div>
    <div class="cat-row">
      <label><input type="checkbox" id="c_05">特別支援教育</label>
      <label><input type="checkbox" id="c_06">教育時事</label>
      <label><input type="checkbox" id="c_07">教育課程・学習指導要領</label>
    </div>
    <div class="cat-row">
      <label><input type="checkbox" id="c_08">教育心理</label>
      <label><input type="checkbox" id="c_09">ICTの活用</label>
      <label><input type="checkbox" id="c_10">カタルート</label>
    </div>
    <div class="cat-row">
      <label><input type="checkbox" id="c_11">小学校全科</label>
      <label><input type="checkbox" id="c_12">重点（京都市）</label>
      <label><input type="checkbox" id="c_13" checked>瞬発力</label>
    </div>
    <div class="cat-row">
      <label><input type="checkbox" id="c_14">重点（京都府）</label>
      <label><input type="checkbox" id="c_15">中高理科</label>
    </div>
    <div id="help_panel" class="help-panel" hidden>
      <p class="help-title">教員採用試験対策フラッシュカードアプリ</p>
      <p>ジャンルにチェックを入れて「スタート」を押すと、シャッフルされたカードが出題されます。</p>
      <table class="help-table">
        <tr><td>次→</td><td>答えを表示。もう一度押すと次の問題へ</td></tr>
        <tr><td>←前</td><td>前の問題に戻る</td></tr>
        <tr><td>☆</td><td>苦手マーク（★）をON/OFF</td></tr>
        <tr><td>★苦手のみ</td><td>マークした問題だけで練習</td></tr>
        <tr><td>全選択/全解除</td><td>全ジャンルを一括でチェック操作</td></tr>
      </table>
      <p class="help-note">※ 下線の引かれた語句が穴埋め箇所です。問題面では文字が隠れています。</p>
    </div>
    <div class="btn-row">
      <button id="select_all" class="btn-sm btn-gray">全選択</button>
      <button id="deselect_all" class="btn-sm btn-gray">全解除</button>
      <button id="reset" class="btn-start">スタート</button>
      <button id="nigate_btn" class="btn-sm btn-orange">★苦手のみ</button>
      <button id="help_btn" class="btn-sm btn-gray">？ 使い方</button>
    </div>
  </header>
  <hr>
  <main>
    <div id="bangou">ジャンルを選んで「スタート」を押してください</div>
    <img id="myimg" alt="" style="display:none; max-width:100%;">
    <div id="mondai"></div>
  </main>
  <hr>
  <footer>
    <button id="L_btn" class="btn-nav btn-blue">←前</button>
    <button id="star_btn" class="btn-star">☆</button>
    <button id="R_btn" class="btn-nav btn-yellow">次→</button>
  </footer>
  <script src="js/main.js"></script>
</body>

</html>
